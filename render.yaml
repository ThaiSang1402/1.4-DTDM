services:
  - type: web
    name: scalable-ai-api-load-balancer
    runtime: docker
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: SERVER_A_URL
        value: https://scalable-ai-api-server-a.onrender.com
      - key: SERVER_B_URL
        value: https://scalable-ai-api-server-b.onrender.com
      - key: PYTHONPATH
        value: /app

  - type: web
    name: scalable-ai-api-server-a
    runtime: docker
    plan: starter
    dockerfilePath: Dockerfile.aiserver
    envVars:
      - key: PORT
        value: 8080
      - key: SERVER_ID
        value: Server A
      - key: PYTHONPATH
        value: /app

  - type: web
    name: scalable-ai-api-server-b
    runtime: docker
    plan: starter
    dockerfilePath: Dockerfile.aiserver
    envVars:
      - key: PORT
        value: 8080
      - key: SERVER_ID
        value: Server B
      - key: PYTHONPATH
        value: /app