# Scalable AI API System Configuration
# This file provides default configuration values that can be overridden
# by environment variables

# Load Balancer Configuration
load_balancer_port: 8000

# Health Check Configuration
health_check_interval: 30  # seconds
health_check_timeout: 5    # seconds

# Request Processing Configuration
request_timeout: 30        # seconds
max_retries: 3
retry_backoff_factor: 2.0

# Logging Configuration
log_level: "INFO"

# Auto Scaling Policy
scaling_policy:
  min_instances: 2
  max_instances: 10
  scale_up_threshold: 80.0    # CPU percentage
  scale_down_threshold: 30.0  # CPU percentage
  cooldown_period: 300        # seconds (5 minutes)
  metrics_window: 300         # seconds (5 minutes)